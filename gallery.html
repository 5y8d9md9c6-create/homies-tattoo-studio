      character: 'ANIME',
      chicano: 'Chicano',
      color: 'AMERICAN TRADITIONAL'
    };

    function normalizeSizeKeyword(q) {
      if (!q) return '';
      const clean = q.trim().toLowerCase();
      if (['ハガキ', 'はがき', '葉書', 'ハガキサイズ', 'postcard'].some(k => clean.includes(k))) return 'ハガキ';
      if (['タバコ', '煙草', 'たばこ', 'タバコサイズ', 'cigarette'].some(k => clean.includes(k))) return 'タバコ';
      if (['コイン', 'coin', 'コインサイズ'].some(k => clean.includes(k))) return 'コイン';
      if (['dvd', 'ディーブイディー', 'dvdサイズ'].some(k => clean.includes(k))) return 'DVD';
      if (['時間彫り', 'large', '時間', 'じかんぼり'].some(k => clean.includes(k))) return '時間彫り';
      return '';
    }

    function applyFilter() {
      const selectedCategory = currentCategory;
      const selectedSize = sizeSelect ? sizeSelect.value : 'all';
      const keyword = searchInput.value.trim().toLowerCase();
      let count = 0;

      cards.forEach(card => {
        const work = works.find(w => String(w.id) === String(card.dataset.id));
        if (!work) {
          card.classList.add('hidden');
          return;
        }

        const matchesCategory =
          selectedCategory === 'all' ||
          (work.categories && work.categories.includes(selectedCategory));

        const matchesSize =
          selectedSize === 'all' ||
          work.size === selectedSize;

        // Normalizing search input for size synonyms
        const querySizeKey = normalizeSizeKeyword(keyword);
        let matchesSynonymSize = false;
        if (querySizeKey) {
          // If query maps to a size key, check if it matches the work's normalized size
          // Mapping work.size to normalized key:
          let workSizeKey = '';
          if (work.size === 'コイン') workSizeKey = 'コイン';
          else if (work.size === 'タバコ') workSizeKey = 'タバコ';
          else if (work.size === 'ハガキ') workSizeKey = 'ハガキ';
          else if (work.size === 'DVD') workSizeKey = 'DVD';
          else if (work.size === '時間彫り') workSizeKey = '時間彫り';
          
          if (workSizeKey === querySizeKey) {
            matchesSynonymSize = true;
          }
        }

        const searchTarget = [
          work.title || '',
          work.label || '',
          work.description || '',
          work.size || '',
          work.placement || '',
          work.time || '',
          work.sessions || '',
          ...(work.categories || [])
        ].join(' ').toLowerCase();

        const matchesKeyword =
          keyword === '' || searchTarget.includes(keyword) || matchesSynonymSize;

        // Logging requested by user
        console.log(selectedSize, work.size, matchesSize);

        const show = matchesCategory && matchesSize && matchesKeyword;
        card.classList.toggle('hidden', !show);
        if (show) count++;
      });

      buttons.forEach(btn => btn.classList.toggle('active', btn.dataset.filter === currentCategory));
      resultText.textContent = `${labels[currentCategory] || 'All works'} / ${count} works`;
    }

    if (sizeSelect) {
      sizeSelect.addEventListener('change', () => {
        currentSize = sizeSelect.value;
        const url = new URL(window.location.href);
        url.searchParams.set('size', currentSize);
        history.replaceState(null, '', url);
        applyFilter();
      });
    }

    buttons.forEach(btn => {
      btn.addEventListener('click', () => {
        currentCategory = btn.dataset.filter;
        const url = new URL(window.location.href);
        url.searchParams.set('category', currentCategory);
        history.replaceState(null, '', url);
        applyFilter();
      });
    });

    searchInput.addEventListener('input', applyFilter);

    function splitTitle(title) {
      const match = title.match(/^(.*?)\s*[（(](.*?)[）)]\s*$/);
      if (match) return [match[1].trim(), '(' + match[2].trim() + ')'];
      return [title, ''];
    }

    function showDetail(id) {
      const work = works.find(item => String(item.id) === String(id));
      if (!work) return;

      if (!listView.classList.contains('hidden')) {
        lastScrollY = window.scrollY;
      }

      listView.classList.add('hidden');
      detailView.classList.add('active');

      const [mainTitle, subTitle] = splitTitle(work.title);
      document.getElementById('detailTitle').textContent = mainTitle;
      document.getElementById('detailSubTitle').textContent = subTitle;
      document.getElementById('detailTime').textContent = work.time || '--';
      document.getElementById('detailSessions').textContent = work.sessions || '--';
      document.getElementById('detailSize').textContent = work.size || '--';
      document.getElementById('detailPlace').textContent = work.placement || '--';
      document.getElementById('detailDesc').textContent = work.description || '';

      const main = document.getElementById('detailMainImage');
      main.src = work.gallery[0].src;
      main.alt = work.gallery[0].alt || work.title;

      const thumbs = document.getElementById('detailThumbs');
      thumbs.innerHTML = '';
      work.gallery.forEach((img, index) => {
        const btn = document.createElement('button');
        btn.className = 'thumb shrink-0 w-20 h-20 sm:w-24 sm:h-24 border border-white/10 opacity-55 hover:opacity-100 transition overflow-hidden bg-[#151515]' + (index === 0 ? ' active' : '');
        btn.innerHTML = `<img src="${img.src}" alt="${img.alt || work.title}" class="w-full h-full object-cover">`;
        btn.addEventListener('click', () => {
          main.src = img.src;
          main.alt = img.alt || work.title;
          thumbs.querySelectorAll('.thumb').forEach(t => t.classList.remove('active'));
          btn.classList.add('active');
        });
        thumbs.appendChild(btn);
      });

      const url = new URL(window.location.href);
      url.searchParams.set('work', work.id);
      history.replaceState(null, '', url);
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    cards.forEach(card => {
      card.addEventListener('click', () => showDetail(card.dataset.id));
    });

    const closeDetailHandler = () => {
      detailView.classList.remove('active');
      listView.classList.remove('hidden');
      const url = new URL(window.location.href);
      url.searchParams.delete('work');
      history.replaceState(null, '', url);
      
      requestAnimationFrame(() => {
        window.scrollTo({
          top: lastScrollY,
          behavior: "auto"
        });
      });
    };

    document.getElementById('backToList').addEventListener('click', closeDetailHandler);
    document.getElementById('closeDetail').addEventListener('click', closeDetailHandler);

    applyFilter();

    const initialWork = new URLSearchParams(window.location.search).get('work');
    if (initialWork) showDetail(initialWork);
  </script>

  <!-- Elegant Diamond Tap Effect (PC & Mobile) -->
  <script>
    (function() {
      document.addEventListener('click', function(e) {
        const effect = document.createElement('div');
        effect.style.position = 'fixed';
        effect.style.left = e.clientX + 'px';
        effect.style.top = e.clientY + 'px';
        effect.style.width = '42px';
        effect.style.height = '42px';
        effect.style.transform = 'translate(-50%, -50%) scale(0.28)';
        effect.style.opacity = '1';
        effect.style.pointerEvents = 'none';
        effect.style.zIndex = '999999';
        effect.style.willChange = 'transform, opacity';
        effect.style.transition = 'transform 1.2s cubic-bezier(0.16, 1, 0.3, 1), opacity 1.2s cubic-bezier(0.25, 1, 0.5, 1)';

        effect.innerHTML = `
          <svg viewBox="0 0 24 24" width="100%" height="100%" fill="none" xmlns="http://www.w3.org/2000/svg" style="filter: drop-shadow(0 0 8px rgba(127,223,255,0.5));">
            <defs>
              <linearGradient id="tap-facet-1" x1="0" y1="0" x2="1" y2="1">
                <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.95"/>
                <stop offset="30%" stop-color="#BFEFFF" stop-opacity="0.85"/>
                <stop offset="100%" stop-color="#7FDFFF" stop-opacity="0.75"/>
              </linearGradient>
              <linearGradient id="tap-facet-2" x1="0.5" y1="0" x2="0.5" y2="1">
                <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.95"/>
                <stop offset="100%" stop-color="#7FDFFF" stop-opacity="0.55"/>
              </linearGradient>
              <linearGradient id="tap-facet-3" x1="1" y1="0" x2="0" y2="1">
                <stop offset="0%" stop-color="#7FDFFF" stop-opacity="0.85"/>
                <stop offset="100%" stop-color="#4CA6FF" stop-opacity="0.6"/>
              </linearGradient>
            </defs>
            <polygon points="8,5 16,5 19,9 5,9" fill="url(#tap-facet-1)" />
            <polygon points="2,9 5,9 8,5" fill="url(#tap-facet-3)" />
            <polygon points="16,5 19,9 22,9" fill="url(#tap-facet-3)" />
            <polygon points="2,9 12,21 7,9" fill="url(#tap-facet-3)" />
            <polygon points="7,9 12,21 12,9" fill="url(#tap-facet-1)" />
            <polygon points="12,9 12,21 17,9" fill="url(#tap-facet-2)" />
            <polygon points="17,9 12,21 22,9" fill="url(#tap-facet-3)" />
            <polyline points="8,5 16,5 19,9 12,21 5,9 8,5" stroke="#FFFFFF" stroke-width="0.45" opacity="0.9"/>
            <line x1="8" y1="5" x2="5" y2="9" stroke="#FFFFFF" stroke-width="0.45" opacity="0.9"/>
            <line x1="16" y1="5" x2="19" y2="9" stroke="#FFFFFF" stroke-width="0.45" opacity="0.9"/>
            <line x1="5" y1="9" x2="19" y2="9" stroke="#FFFFFF" stroke-width="0.45" opacity="0.9"/>
            <line x1="12" y1="9" x2="12" y2="21" stroke="#FFFFFF" stroke-width="0.45" opacity="0.9"/>
          </svg>
        `;

        document.body.appendChild(effect);

        requestAnimationFrame(function() {
          effect.style.transform = 'translate(-50%, -75%) scale(1)';
          effect.style.opacity = '0';
        });

        setTimeout(function() {
          effect.remove();
        }, 1200);
      });
    })();
  </script>
