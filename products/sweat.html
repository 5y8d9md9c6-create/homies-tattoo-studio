  <!-- Product Page Custom Script -->
  <script>
    // Easily configurable product image list (relative to parent)
    const productImages = [
      "../gallery/apparel_sweat.png",
      "../gallery/apparel_sweat.png",
      "../gallery/apparel_sweat.png"
    ];

    let cart = [];

    // Load Cart operations
    function loadCart() {
      const savedCart = localStorage.getItem('diamondfam_cart');
      if (savedCart) {
        try {
          cart = JSON.parse(savedCart);
        } catch(e) {
          cart = [];
        }
      }
      updateCartUI();
    }

    function saveCart() {
      localStorage.setItem('diamondfam_cart', JSON.stringify(cart));
      updateCartUI();
    }

    function addProductToBag() {
      const size = document.getElementById('size-selector').value;
      const qty = parseInt(document.getElementById('qty-selector').value);

      const existingItem = cart.find(item => item.name === 'Sweat' && item.size === size);
      if (existingItem) {
        existingItem.qty += qty;
      } else {
        cart.push({
          name: 'Sweat',
          img: 'gallery/apparel_sweat.png',
          size: size,
          qty: qty
        });
      }

      saveCart();
      toggleCartDrawer(true);
    }

    function removeFromCart(index) {
      cart.splice(index, 1);
      saveCart();
    }

    function updateQty(index, newQty) {
      if (newQty <= 0) {
        removeFromCart(index);
      } else {
        cart[index].qty = parseInt(newQty);
        saveCart();
      }
    }

    // Toggle Drawer overlay and panel states
    function toggleCartDrawer(open) {
      const overlay = document.getElementById('cart-overlay');
      const drawer = document.getElementById('cart-drawer');
      if (open) {
        overlay.classList.remove('pointer-events-none');
        overlay.classList.remove('opacity-0');
        overlay.classList.add('opacity-100');
        drawer.classList.remove('translate-x-full');
      } else {
        overlay.classList.add('pointer-events-none');
        overlay.classList.remove('opacity-100');
        overlay.classList.add('opacity-0');
        drawer.classList.add('translate-x-full');
      }
    }

    function updateCartUI() {
      const badge = document.getElementById('cart-badge');
      const container = document.getElementById('cart-items-container');
      const totalCount = cart.reduce((total, item) => total + item.qty, 0);

      // Badge update
      if (totalCount > 0) {
        badge.textContent = totalCount;
        badge.classList.remove('scale-0');
        badge.classList.add('scale-100');
      } else {
        badge.classList.remove('scale-100');
        badge.classList.add('scale-0');
      }

      // Render items
      if (cart.length === 0) {
        container.innerHTML = `
          <div class="flex flex-col items-center justify-center h-full text-center py-20 text-zinc-500">
            <span class="text-xs tracking-widest font-semibold">カートは空です</span>
            <span class="text-[9px] uppercase mt-2">アパレル商品をカートに追加してください。</span>
          </div>
        `;
      } else {
        container.innerHTML = cart.map((item, idx) => `
          <div class="flex items-center gap-4 bg-[#0a0a0a] p-3 border border-zinc-900 rounded-sm">
            <img src="../${item.img}" class="w-12 h-16 object-cover border border-zinc-900" alt="${item.name}">
            <div class="flex-grow flex flex-col justify-between">
              <div class="flex justify-between items-start">
                <div>
                  <h4 class="font-cinzel text-xs text-white tracking-widest uppercase">${item.name}</h4>
                  <p class="text-[9px] text-zinc-500 mt-0.5">サイズ: ${item.size}</p>
                </div>
                <button onclick="removeFromCart(${idx})" class="text-[9px] text-red-500/70 hover:text-red-400 tracking-wider">削除</button>
              </div>
              <div class="flex items-center justify-between mt-2">
                <div class="flex items-center gap-2 border border-zinc-800 px-1">
                  <button onclick="updateQty(${idx}, ${item.qty - 1})" class="text-zinc-500 hover:text-white px-1 text-xs">-</button>
                  <span class="text-[10px] text-zinc-300 px-1 font-semibold">${item.qty}</span>
                  <button onclick="updateQty(${idx}, ${item.qty + 1})" class="text-zinc-500 hover:text-white px-1 text-xs">+</button>
                </div>
                <span class="font-cinzel text-[10px] text-gold font-bold">ASK</span>
              </div>
            </div>
          </div>
        `).join('');
      }
    }

    // Gallery controller
    function initGallery() {
      const mainImg = document.getElementById('main-product-image');
      const thumbContainer = document.getElementById('thumbnails-container');

      // Set initial main image
      mainImg.src = productImages[0];

      // Build thumbnails markup
      thumbContainer.innerHTML = productImages.map((src, index) => `
        <button onclick="switchMainImage('${src}', this)" class="w-16 sm:w-20 aspect-[3/4] bg-black/40 border border-zinc-800 opacity-60 hover:opacity-100 transition-all duration-300 flex-shrink-0 select-none focus:outline-none ${index === 0 ? 'active-thumb' : ''}">
          <img src="${src}" class="w-full h-full object-cover">
        </button>
      `).join('');
    }

    function switchMainImage(src, element) {
      const mainImg = document.getElementById('main-product-image');
      mainImg.style.opacity = '0';
      
      setTimeout(() => {
        mainImg.src = src;
        mainImg.style.opacity = '1';
      }, 150);

      // Reset thumbnails style
      document.querySelectorAll('#thumbnails-container button').forEach(btn => {
        btn.classList.remove('active-thumb');
      });
      element.classList.add('active-thumb');
    }

    // Initialize Page
    loadCart();
    initGallery();
  </script>
