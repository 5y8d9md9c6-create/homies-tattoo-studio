<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>購入手続き - KWTWORKS HOMIES GALLERY</title>
  
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Tailwind Config Customizations -->
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            gold: {
              light: '#e8d8b8',
              DEFAULT: '#bba370',
              bright: '#d9bf8f',
              dark: '#8c764c',
              deep: '#5c4b2b',
            }
          },
          fontFamily: {
            cinzel: ['"Cinzel"', 'serif'],
            montserrat: ['"Montserrat"', 'sans-serif'],
          }
        }
      }
    }
  </script>

  <!-- Typography & Global CSS -->
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Montserrat:wght@300;400;600&display=swap');

    body {
      background-color: #050505;
      color: #e5e7eb;
      font-family: 'Montserrat', 'Helvetica Neue', Arial, sans-serif;
      overflow-x: hidden;
    }

    /* Ornate borders mimicking traditional frames */
    .ornate-border {
      position: relative;
    }
    .ornate-border::before {
      content: '';
      position: absolute;
      inset: 2px;
      border: 1px solid rgba(187, 163, 112, 0.25);
      pointer-events: none;
    }

    /* Form Inputs styling */
    input, select, textarea {
      background-color: #0a0a0a !important;
      border: 1px solid #27272a !important;
      color: #f4f4f5 !important;
      transition: border-color 0.3s ease, box-shadow 0.3s ease;
    }
    input:focus, select:focus, textarea:focus {
      border-color: #bba370 !important;
      box-shadow: 0 0 8px rgba(187, 163, 112, 0.15);
      outline: none;
    }
  </style>
</head>
<body class="min-h-screen flex flex-col justify-between bg-[#050505] selection:bg-gold/30 selection:text-white">

  <!-- Elegant Top Header & Navigation -->
  <header class="w-full py-6 px-4 md:px-8 border-b border-zinc-900 bg-black/80 backdrop-blur-md sticky top-0 z-50">
    <div class="max-w-7xl mx-auto flex items-center justify-between">
      <!-- Back to Shop page -->
      <a href="./shop.html" class="flex items-center gap-2 group text-xs text-zinc-400 hover:text-gold tracking-[0.2em] font-cinzel transition-colors duration-300">
        <span class="transform group-hover:-translate-x-1.5 transition-transform duration-300">←</span>
        <span>カートに戻る</span>
      </a>

      <!-- Brand Logo / Identity -->
      <a href="./index.html" class="font-cinzel text-sm sm:text-base tracking-[0.3em] font-semibold text-white hover:text-gold transition-colors duration-300">
        HOMIES GALLERY
      </a>

      <!-- Cart Icon Trigger -->
      <button onclick="toggleCartDrawer(true)" class="relative flex items-center justify-center text-white hover:text-[#e8d8b8] transition-colors duration-300 focus:outline-none w-10 h-10 group">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-[26px] h-[26px]" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M2.25 3h1.386c.51 0 .955.343 1.087.835l.383 1.437M7.5 14.25a3 3 0 00-3 3h15.75m-12.75-3h11.218c1.121-2.3 2.1-4.684 2.924-7.138a60.114 60.114 0 00-16.536-1.84M7.5 14.25L5.106 5.272M6 20.25a.75.75 0 11-1.5 0 .75.75 0 011.5 0zm12.75 0a.75.75 0 11-1.5 0 .75.75 0 011.5 0z" />
        </svg>
        <span id="cart-badge" class="bg-[#C7A05A] text-black font-bold text-[10px] w-[20px] h-[20px] rounded-full flex items-center justify-center absolute -top-1 -right-1 border border-black shadow-[0_2px_5px_rgba(0,0,0,0.3)] transform scale-0 transition-transform duration-300">0</span>
      </button>
    </div>
  </header>

  <!-- Main Checkout Container -->
  <main class="flex-grow w-full max-w-7xl mx-auto px-4 md:px-8 py-12 md:py-16">
    <div class="grid grid-cols-1 lg:grid-cols-12 gap-8 lg:gap-12">
      
      <!-- Left side: Shipping & Checkout Form (Span 7) -->
      <div class="lg:col-span-7 space-y-8">
        <div class="border border-zinc-800 p-6 bg-zinc-950/40 rounded-sm ornate-border">
          <h2 class="text-sm font-semibold tracking-wider text-white border-b border-zinc-800 pb-4 mb-6">お客様情報・お届け先住所</h2>
          
          <form id="checkout-form" onsubmit="handlePlaceOrder(event)" class="space-y-4">
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
              <div>
                <label class="block text-[10px] tracking-wider text-zinc-400 mb-1.5">お名前 *</label>
                <input type="text" required class="w-full py-2.5 px-3.5 text-xs text-white" placeholder="山田 太郎">
              </div>
              <div>
                <label class="block text-[10px] tracking-wider text-zinc-400 mb-1.5">メールアドレス *</label>
                <input type="email" required class="w-full py-2.5 px-3.5 text-xs text-white" placeholder="yamada@example.com">
              </div>
            </div>

            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
              <div>
                <label class="block text-[10px] tracking-wider text-zinc-400 mb-1.5">電話番号 *</label>
                <input type="tel" required class="w-full py-2.5 px-3.5 text-xs text-white" placeholder="090-1234-5678">
              </div>
              <div>
                <label class="block text-[10px] tracking-wider text-zinc-400 mb-1.5">郵便番号 *</label>
                <input type="text" required class="w-full py-2.5 px-3.5 text-xs text-white" placeholder="150-0001">
              </div>
            </div>

            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
              <div>
                <label class="block text-[10px] tracking-wider text-zinc-400 mb-1.5">都道府県 *</label>
                <input type="text" required class="w-full py-2.5 px-3.5 text-xs text-white" placeholder="東京都">
              </div>
              <div>
                <label class="block text-[10px] tracking-wider text-zinc-400 mb-1.5">市区町村 *</label>
                <input type="text" required class="w-full py-2.5 px-3.5 text-xs text-white" placeholder="渋谷区">
              </div>
            </div>

            <div>
              <label class="block text-[10px] tracking-wider text-zinc-400 mb-1.5">番地・建物名 *</label>
              <input type="text" required class="w-full py-2.5 px-3.5 text-xs text-white" placeholder="神宮前1-2-3 ○○マンション 101号室">
            </div>

            <div class="pt-4">
              <h3 class="text-xs font-semibold tracking-wider text-white border-b border-zinc-900 pb-2 mb-4">お支払い方法</h3>
              <div class="grid grid-cols-1 sm:grid-cols-2 gap-2">
                <label class="flex items-center gap-3 bg-[#0a0a0a] p-3 border border-zinc-900 hover:border-[#C7A05A]/45 cursor-pointer transition-colors duration-300">
                  <input type="radio" name="payment" checked class="w-4 h-4 text-gold border-zinc-700 bg-black focus:ring-0">
                  <span class="text-xs text-zinc-300 font-medium">クレジットカード</span>
                </label>
                <label class="flex items-center gap-3 bg-[#0a0a0a] p-3 border border-zinc-900 hover:border-[#C7A05A]/45 cursor-pointer transition-colors duration-300">
                  <input type="radio" name="payment" class="w-4 h-4 text-gold border-zinc-700 bg-black focus:ring-0">
                  <span class="text-xs text-zinc-300 font-medium">PayPay</span>
                </label>
                <label class="flex items-center gap-3 bg-[#0a0a0a] p-3 border border-zinc-900 hover:border-[#C7A05A]/45 cursor-pointer transition-colors duration-300">
                  <input type="radio" name="payment" class="w-4 h-4 text-gold border-zinc-700 bg-black focus:ring-0">
                  <span class="text-xs text-zinc-300 font-medium">iD</span>
                </label>
                <label class="flex items-center gap-3 bg-[#0a0a0a] p-3 border border-zinc-900 hover:border-[#C7A05A]/45 cursor-pointer transition-colors duration-300">
                  <input type="radio" name="payment" class="w-4 h-4 text-gold border-zinc-700 bg-black focus:ring-0">
                  <span class="text-xs text-zinc-300 font-medium">QUICPay</span>
                </label>
                <label class="flex items-center gap-3 bg-[#0a0a0a] p-3 border border-zinc-900 hover:border-[#C7A05A]/45 cursor-pointer transition-colors duration-300">
                  <input type="radio" name="payment" class="w-4 h-4 text-gold border-zinc-700 bg-black focus:ring-0">
                  <span class="text-xs text-zinc-300 font-medium">au PAY</span>
                </label>
                <label class="flex items-center gap-3 bg-[#0a0a0a] p-3 border border-zinc-900 hover:border-[#C7A05A]/45 cursor-pointer transition-colors duration-300">
                  <input type="radio" name="payment" class="w-4 h-4 text-gold border-zinc-700 bg-black focus:ring-0">
                  <span class="text-xs text-zinc-300 font-medium">楽天ペイ</span>
                </label>
                <label class="flex items-center gap-3 bg-[#0a0a0a] p-3 border border-zinc-900 hover:border-[#C7A05A]/45 cursor-pointer transition-colors duration-300">
                  <input type="radio" name="payment" class="w-4 h-4 text-gold border-zinc-700 bg-black focus:ring-0">
                  <span class="text-xs text-zinc-300 font-medium">Apple Pay</span>
                </label>
                <label class="flex items-center gap-3 bg-[#0a0a0a] p-3 border border-zinc-900 hover:border-[#C7A05A]/45 cursor-pointer transition-colors duration-300">
                  <input type="radio" name="payment" class="w-4 h-4 text-gold border-zinc-700 bg-black focus:ring-0">
                  <span class="text-xs text-zinc-300 font-medium">Amazon Pay</span>
                </label>
                <label class="flex items-center gap-3 bg-[#0a0a0a] p-3 border border-zinc-900 hover:border-[#C7A05A]/45 cursor-pointer transition-colors duration-300">
                  <input type="radio" name="payment" class="w-4 h-4 text-gold border-zinc-700 bg-black focus:ring-0">
                  <span class="text-xs text-zinc-300 font-medium">銀行振込</span>
                </label>
                <label class="flex items-center gap-3 bg-[#0a0a0a] p-3 border border-zinc-900 hover:border-[#C7A05A]/45 cursor-pointer transition-colors duration-300">
                  <input type="radio" name="payment" class="w-4 h-4 text-gold border-zinc-700 bg-black focus:ring-0">
                  <span class="text-xs text-zinc-300 font-medium">代金引換</span>
                </label>
              </div>
            </div>

            <div class="pt-6">
              <button type="submit" class="w-full py-4 text-center border border-[#C7A05A]/45 bg-gradient-to-r from-[#C7A05A] to-[#d9bf8f] text-black text-xs font-bold tracking-[0.25em] transition-all duration-300 hover:shadow-[0_0_20px_rgba(187,163,112,0.4)]">
                注文を確定する
              </button>
            </div>
          </form>
        </div>
      </div>

      <!-- Right side: Order Summary (Span 5) -->
      <div class="lg:col-span-5">
        <div class="border border-zinc-800 p-6 bg-zinc-950/40 rounded-sm">
          <h2 class="text-sm font-semibold tracking-wider text-white border-b border-zinc-800 pb-4 mb-6">ご注文内容</h2>
          
          <!-- Summary Items Container -->
          <div id="checkout-items-container" class="space-y-4 mb-6">
            <!-- Rendered cart items will output here -->
          </div>

          <!-- Total Summary -->
          <div class="border-t border-zinc-800 pt-4 space-y-2">
            <div class="flex items-center justify-between text-xs">
              <span class="text-zinc-400 font-medium">配送料</span>
              <span class="text-zinc-400">無料</span>
            </div>
            <div class="flex items-center justify-between text-sm pt-2 border-t border-zinc-900">
              <span class="text-white font-semibold tracking-wider">合計金額</span>
              <span class="font-cinzel tracking-widest text-gold font-bold">ASK</span>
            </div>
          </div>
        </div>
      </div>

    </div>
  </main>

  <!-- Luxury Modal Warning (Demo) -->
  <div id="demo-modal" class="fixed inset-0 flex items-center justify-center bg-black/80 z-[100] opacity-0 pointer-events-none transition-opacity duration-300">
    <div class="w-full max-w-[420px] bg-[#0c0c0c] border border-zinc-800 p-8 text-center ornate-border shadow-[0_0_50px_rgba(0,0,0,0.9)] space-y-6">
      <div class="flex justify-center">
        <!-- Ornate Alert Icon -->
        <div class="w-12 h-12 border border-[#C7A05A]/45 rounded-full flex items-center justify-center bg-gradient-to-br from-[#0c0c0c] to-black">
          <span class="text-[#C7A05A] text-xl font-semibold font-cinzel">!</span>
        </div>
      </div>
      
      <div class="space-y-2">
        <h3 class="text-sm tracking-wider text-white font-semibold">お知らせ / デモ画面</h3>
        <p class="text-xs text-zinc-400 leading-relaxed">
          現在はデモ画面です。決済システム連携後に購入可能になります。
        </p>
      </div>

      <button onclick="closeDemoModal()" class="w-full py-2.5 text-center border border-zinc-800 hover:border-zinc-500 text-xs font-semibold tracking-widest transition-all duration-300">
        閉じる
      </button>
    </div>
  </div>

  <script>
    let cart = [];

    function loadCart() {
      const savedCart = localStorage.getItem('diamondfam_cart');
      if (savedCart) {
        try {
          cart = JSON.parse(savedCart);
        } catch (e) {
          cart = [];
        }
      } else {
        cart = [];
      }
      updateCartUI();
      loadCheckoutSummary();
    }

    function saveCart() {
      localStorage.setItem('diamondfam_cart', JSON.stringify(cart));
      updateCartUI();
      loadCheckoutSummary();
    }

    function removeFromCart(index) {
      cart.splice(index, 1);
      saveCart();
    }

    function updateQty(index, newQty) {
      if (newQty <= 0) {
        removeFromCart(index);
      } else {
        cart[index].qty = parseInt(newQty);
        saveCart();
      }
    }

    function toggleCartDrawer(open) {
      const overlay = document.getElementById('cart-overlay');
      const drawer = document.getElementById('cart-drawer');
      if (open) {
        overlay.classList.remove('pointer-events-none');
        overlay.classList.remove('opacity-0');
        overlay.classList.add('opacity-100');
        drawer.classList.remove('translate-x-full');
      } else {
        overlay.classList.add('pointer-events-none');
        overlay.classList.remove('opacity-100');
        overlay.classList.add('opacity-0');
        drawer.classList.add('translate-x-full');
      }
    }

    function updateCartUI() {
      const badge = document.getElementById('cart-badge');
      const container = document.getElementById('cart-items-container');
      const totalCount = cart.reduce((total, item) => total + item.qty, 0);

      // Badge update
      if (totalCount > 0) {
        badge.textContent = totalCount;
        badge.classList.remove('scale-0');
        badge.classList.add('scale-100');
      } else {
        badge.classList.remove('scale-100');
        badge.classList.add('scale-0');
      }

      // Render items in drawer
      if (cart.length === 0) {
        container.innerHTML = `
          <div class="flex flex-col items-center justify-center h-full text-center py-20 text-zinc-500">
            <span class="text-xs tracking-widest font-semibold">カートは空です</span>
            <span class="text-[9px] uppercase mt-2">アパレル商品をカートに追加してください。</span>
          </div>
        `;
      } else {
        container.innerHTML = cart.map((item, idx) => `
          <div class="flex items-center gap-4 bg-[#0a0a0a] p-3 border border-zinc-900 rounded-sm">
            <img src="${item.img}" class="w-12 h-16 object-cover border border-zinc-900" alt="${item.name}">
            <div class="flex-grow flex flex-col justify-between">
              <div class="flex justify-between items-start">
                <div>
                  <h4 class="font-cinzel text-xs text-white tracking-widest uppercase">${item.name}</h4>
                  <p class="text-[9px] text-zinc-500 mt-0.5">サイズ: ${item.size}</p>
                </div>
                <button onclick="removeFromCart(${idx})" class="text-[9px] text-red-500/70 hover:text-red-400 tracking-wider">削除</button>
              </div>
              <div class="flex items-center justify-between mt-2">
                <div class="flex items-center gap-2 border border-zinc-800 px-1">
                  <button onclick="updateQty(${idx}, ${item.qty - 1})" class="text-zinc-500 hover:text-white px-1 text-xs">-</button>
                  <span class="text-[10px] text-zinc-300 px-1 font-semibold">${item.qty}</span>
                  <button onclick="updateQty(${idx}, ${item.qty + 1})" class="text-zinc-500 hover:text-white px-1 text-xs">+</button>
                </div>
                <span class="font-cinzel text-[10px] text-gold font-bold">ASK</span>
              </div>
            </div>
          </div>
        `).join('');
      }
    }

    // Load Cart items for review in the checkout page body
    function loadCheckoutSummary() {
      const container = document.getElementById('checkout-items-container');

      if (cart.length === 0) {
        container.innerHTML = `
          <p class="text-xs text-zinc-500 py-4 text-center">カート内に商品がありません</p>
        `;
      } else {
        container.innerHTML = cart.map(item => `
          <div class="flex items-center gap-4 py-2 border-b border-zinc-900 last:border-b-0">
            <img src="${item.img}" class="w-10 h-14 object-cover border border-zinc-900" alt="${item.name}">
            <div class="flex-grow flex flex-col">
              <h4 class="font-cinzel text-xs text-white tracking-widest uppercase">${item.name}</h4>
              <p class="text-[9px] text-zinc-500 mt-0.5">サイズ: ${item.size} / 数量: ${item.qty}</p>
            </div>
            <span class="font-cinzel text-xs text-gold">ASK</span>
          </div>
        `).join('');
      }
    }

    function handlePlaceOrder(e) {
      e.preventDefault();
      if (cart.length === 0) {
        alert("カートに商品がありません");
        return;
      }
      // Open the custom warning modal
      const modal = document.getElementById('demo-modal');
      modal.classList.remove('pointer-events-none');
      modal.classList.remove('opacity-0');
      modal.classList.add('opacity-100');
    }

    function closeDemoModal() {
      const modal = document.getElementById('demo-modal');
      modal.classList.add('pointer-events-none');
      modal.classList.remove('opacity-100');
      modal.classList.add('opacity-0');
    }

    // Initialize Page
    loadCart();
  </script>

  <!-- Footer -->
  <footer class="w-full py-8 border-t border-zinc-900 bg-black text-center mt-12">
    <p class="text-[10px] text-zinc-500 tracking-widest uppercase">
      &copy; 2026 KWTWORKS HOMIES. ALL RIGHTS RESERVED.
    </p>
  </footer>


  <!-- Cart Sidebar Drawer Overlay -->
  <div id="cart-overlay" onclick="toggleCartDrawer(false)" class="fixed inset-0 bg-black/70 z-50 opacity-0 pointer-events-none transition-opacity duration-500"></div>

  <!-- Cart Sidebar Drawer Panel -->
  <div id="cart-drawer" class="fixed top-0 right-0 bottom-0 w-full max-w-[420px] bg-[#0c0c0c] border-l border-zinc-800 shadow-[0_0_40px_rgba(0,0,0,0.8)] z-50 translate-x-full transition-transform duration-500 flex flex-col justify-between">
    <!-- Header -->
    <div class="p-6 border-b border-zinc-900 flex items-center justify-between">
      <h2 class="font-cinzel text-base tracking-[0.2em] text-white">ショッピングカート</h2>
      <button onclick="toggleCartDrawer(false)" class="text-zinc-400 hover:text-gold text-xs tracking-widest font-cinzel focus:outline-none">閉じる</button>
    </div>

    <!-- Scrollable Items Area -->
    <div id="cart-items-container" class="flex-grow p-6 overflow-y-auto space-y-4">
      <!-- Dynamic list of items will render here -->
    </div>

    <!-- Footer Summary and Action -->
    <div class="p-6 border-t border-zinc-900 bg-black/40 space-y-4">
      <div class="flex items-center justify-between text-sm">
        <span class="tracking-widest text-zinc-400 font-medium">小計</span>
        <span id="cart-subtotal" class="font-cinzel tracking-widest text-gold font-bold">ASK</span>
      </div>
      <p class="text-[10px] text-zinc-500 leading-normal">
        配送料等は注文手続き時に計算されます。セキュリティのため、本番の決済処理は無効化されています。
      </p>
      <a href="./checkout.html" class="block w-full py-4 text-center border border-[#C7A05A]/45 bg-gradient-to-r from-[#C7A05A] to-[#d9bf8f] text-black text-xs font-bold tracking-[0.25em] transition-all duration-300 hover:shadow-[0_0_15px_rgba(187,163,112,0.3)]">
        購入手続きへ
      </a>
    </div>
  </div>

</body>
</html>
